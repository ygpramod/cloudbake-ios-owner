name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-integration-tests:
    name: Unit and Integration Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit and integration tests
        run: |
          select_simulator() {
            for preferred_name in "iPhone 17 Pro" "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15"; do
              if xcrun simctl list devices available | grep -q "$preferred_name ("; then
                echo "$preferred_name"
                return
              fi
            done

            xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { gsub(/^ +| +$/, "", $1); print $1; exit }'
          }

          SIMULATOR_NAME="$(select_simulator)"
          if [ -z "$SIMULATOR_NAME" ]; then
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using iOS simulator: $SIMULATOR_NAME"

          mkdir -p TestResults
          xcodebuild test \
            -project CloudBakeOwner.xcodeproj \
            -scheme CloudBakeOwnerUnitIntegration \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -resultBundlePath TestResults/UnitIntegration.xcresult

      - name: Upload unit and integration result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-integration-xcresult
          path: TestResults/UnitIntegration.xcresult
          if-no-files-found: ignore

  acceptance-tests:
    name: Acceptance UI Tests (${{ matrix.feature }})
    runs-on: macos-15
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: core-recipes
            only_testing: |
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testAppLaunchesToDashboard
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOverdueAutomaticBackupOnCellularDoesNotDelayLaunchOrStartTransfer
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testPrimaryNavigationDestinationsAreReachable
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testSettingsShowsInventoryCSVActions
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testInventoryCSVExportPresentsDestinationPicker
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudBackupSettingsRequireCellularConfirmation
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudBackupRequiresConfirmationBeforeUsingCurrentICloudAccount
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudBackupDeletionRequiresConfirmationAndPreservesSettingsScreen
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudBackupDeletionFailureKeepsBackupDisabledAndRetryable
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudBackupNotificationsCanBeDisabled
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testEmptyInstallationOffersRestoreOrStartFresh
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testEmptyInstallationRestoresCompatibleBackupOnWiFi
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudRestoreRequiresDestructiveCellularAndBrokenAssetChoices
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudRestoreExplainsWhenAppUpdateIsRequired
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudRestoreReportsSuccessfulRollbackAfterActivationFailure
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCloudRestoreBlocksAppWhenRollbackCannotBeGuaranteed
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testRecipesCanBeAdded
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testRecipeCanBeImportedFromRecognizedTextDraft
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testRecipeIngredientCanBeAddedFromInventory
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testRecipeNotesCanBeEditedFromDetail
          - feature: orders-core
            only_testing: |
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCanBeAddedAndListed
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCanBeOpenedFromListAndViewed
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderDetailCanMarkPaymentPaid
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderShowsDueRemindersAndReminderPlan
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderShowsProjectedIngredientShortageAcrossActiveOrders
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderIngredientCostShowsPartialTotalAndMissingPriceWarning
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderStatusFailureIsShownImmediatelyFromDetail
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testDraftOrderCannotBypassInventoryDeductionWhenMarkedReady
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCanBeEditedFromDetail
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCalendarViewShowsOrders
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCompletedOrderAppearsInCompletedTab
          - feature: order-links
            only_testing: |
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderShowsLinkedCustomerContext
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCanCreateAndLinkNewCustomerFromSelection
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCanLinkRecipeFromSearchableSelection
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCanLinkDesignFromSearchableSelection
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testOrderCanSelectCustomerReferenceFromPhotoFirstDesignPicker
          - feature: customers
            only_testing: |
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCustomerCanBeAddedAndViewed
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCustomerAddOffersContactsImportAndManualEntry
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCustomerDuplicateWarningAppearsBeforeSaving
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCustomerCanBeEditedFromDetail
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCustomerCanBeDeletedFromDetail
          - feature: inventory
            only_testing: |
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testInventoryDuplicateNameShowsWarningBeforeAdding
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testInventoryOwnerJourneyShowsDetailEditsStockHistoryAndDashboard
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testInventoryCanBeArchivedAndRestored
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testInventoryDetailShowsStockActionsInMoreMenu
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testInventoryPurchaseBillImportShowsCameraAndManualDraftControls
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testExpiredInventoryCanBeDisposedFromItemDetail
          - feature: designs
            only_testing: |
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testDesignRemovalCanBeCancelledAndConfirmed
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testDesignCanStartAnUnsavedOrderDraftWithTheDesignLinked
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testCustomerReferenceDraftShowsItsCurrentSelectedProvenance
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testDesignDetailSupportsZoomControlsAndAdjacentSwipe
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testDesignLandingCanScrollFromBottomBackToTop
              CloudBakeOwnerUITests/CloudBakeOwnerUITests/testMyDesignsAddActionOpensPhotosOwnedImportForm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run acceptance UI tests
        run: |
          select_simulator() {
            for preferred_name in "iPhone 17 Pro" "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15"; do
              if xcrun simctl list devices available | grep -q "$preferred_name ("; then
                echo "$preferred_name"
                return
              fi
            done

            xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { gsub(/^ +| +$/, "", $1); print $1; exit }'
          }

          SIMULATOR_NAME="$(select_simulator)"
          if [ -z "$SIMULATOR_NAME" ]; then
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using iOS simulator: $SIMULATOR_NAME"

          mkdir -p TestResults
          TEST_FILTERS=()
          while IFS= read -r test_name; do
            if [ -n "$test_name" ]; then
              TEST_FILTERS+=("-only-testing:$test_name")
            fi
          done <<< "$ONLY_TESTING"

          xcodebuild test \
            -project CloudBakeOwner.xcodeproj \
            -scheme CloudBakeOwnerAcceptance \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            "${TEST_FILTERS[@]}" \
            -resultBundlePath "TestResults/Acceptance-${{ matrix.feature }}.xcresult"
        env:
          ONLY_TESTING: ${{ matrix.only_testing }}

      - name: Upload acceptance result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-${{ matrix.feature }}-xcresult
          path: TestResults/Acceptance-${{ matrix.feature }}.xcresult
          if-no-files-found: ignore
