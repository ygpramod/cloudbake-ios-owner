name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test
        run: |
          xcodebuild test \
            -project CloudBakeOwner.xcodeproj \
            -scheme CloudBakeOwner \
            -destination 'platform=iOS Simulator,name=iPhone 16'
