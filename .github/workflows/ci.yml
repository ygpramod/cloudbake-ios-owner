name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-integration-tests:
    name: Unit and Integration Tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit and integration tests
        run: |
          SIMULATOR_NAME="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { gsub(/^ +| +$/, "", $1); print $1; exit }')"
          if [ -z "$SIMULATOR_NAME" ]; then
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using iOS simulator: $SIMULATOR_NAME"

          xcodebuild test \
            -project CloudBakeOwner.xcodeproj \
            -scheme CloudBakeOwnerUnitIntegration \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME"

  acceptance-tests:
    name: Acceptance UI Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run acceptance UI tests
        run: |
          SIMULATOR_NAME="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { gsub(/^ +| +$/, "", $1); print $1; exit }')"
          if [ -z "$SIMULATOR_NAME" ]; then
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using iOS simulator: $SIMULATOR_NAME"

          xcodebuild test \
            -project CloudBakeOwner.xcodeproj \
            -scheme CloudBakeOwnerAcceptance \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME"
